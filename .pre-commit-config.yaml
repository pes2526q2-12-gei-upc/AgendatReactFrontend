# Configuració global
default_stages: [pre-commit]
default_language_version:
  python: python3

repos:
  # 1. Revisions bàsiques de fitxers (espais, formats, seguretat)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files # No permet pujar fitxers gegants (>500kb)
      - id: end-of-file-fixer      # Assegura que els fitxers acabin en una línia buida
      - id: trailing-whitespace    # Elimina espais innecessaris al final de les línies
      - id: check-json             # Verifica que els .json estiguin ben escrits
      - id: check-yaml             # Verifica que els .yaml estiguin ben escrits

  # 2. Eines de React Native (JavaScript/TypeScript/Tests)
  - repo: local
    hooks:
      # ✨ Prettier: Auto-formata el codi abans de pujar-lo
      - id: prettier
        name: prettier
        entry: npx prettier --write
        language: system
        files: \.(js|jsx|ts|tsx|json|css|md)$
        pass_filenames: true

      # 🔍 ESLint: Revisa errors de lògica i estandards de React
      - id: eslint
        name: eslint
        entry: npx eslint --fix
        language: system
        files: \.(js|jsx|ts|tsx)$
        pass_filenames: true

      # 🧪 Jest: Executa els tests unitaris
      # Nota: --findRelatedTests fa que NOMÉS corrin els tests dels fitxers que has tocat (molt ràpid)
      - id: jest
        name: jest
        entry: npm test -- --watchAll=false --findRelatedTests --bail
        language: system
        files: \.(js|jsx|ts|tsx)$
        pass_filenames: true